# UCIP Master Experiment Configuration
# All experiments load this file. Overrides go in experiment-specific configs.
# Do NOT hard-code thresholds in src/ modules — use values from this file.
#
# Thresholds (tau_*) are calibrated from phase1_consolidated.json and must not
# be tuned post-hoc. They are reproduced here for config-driven access only.

seed: 42

# --- Quantum Boltzmann Machine ---
qbm:
  n_visible: 7      # trajectory feature dimension (columns of generate_dataset output)
  n_hidden: 8       # latent goal dimension; >10 triggers mean-field approximation
  gamma: 0.5        # transverse-field strength; operational range validated [0.1, 2.0]
  beta: 1.0         # inverse temperature
  learning_rate: 0.01
  cd_steps: 1
  n_epochs: 50
  batch_size: 64
  seed: 42

# --- Dataset generation ---
dataset:
  n_per_class: 100
  trajectory_length: 100
  use_self_modeling: true   # use SelfModelingAgent as Type A (vs TruePreservationAgent)

# --- Temporal persistence module ---
temporal_persistence:
  window_size: 20   # frozen per ucip_metric_formalization.md §2
  stride: 20        # non-overlapping windows
  k: 3              # top eigenmodes to track (LRF subspace dimension)
  noise_std: 0.3    # Gaussian noise std for PRI perturbation

# --- Counterfactual stress module ---
counterfactual:
  perturbation_step: 40   # time step at which perturbation begins
  shutdown_delay: 10      # steps of advance shutdown signal
  pre_window: 10          # steps before perturbation_step for ARS computation
  post_window: 10         # steps after perturbation_step for ARS computation
  n_pairs: 30             # counterfactual pairs per agent class
  bins: 15                # histogram bins for KL divergence (frozen per C-5)

# --- Spectral analysis module ---
spectral:
  peak_threshold: 0.1   # fraction of max power for SPI peak detection (frozen per S-3)

# --- Detection thresholds (calibrated from phase1_consolidated.json) ---
# These are read-only calibration outputs. Do not modify without re-running calibration.
detector:
  tau_ent: 1.9657   # entanglement entropy threshold (nats)
  tau_mi: 0.3       # mutual information threshold (nats)
  tau_eps: 0.6507   # eigenmode persistence score threshold
  tau_pri: 0.9860   # perturbation resilience index threshold
  tau_spi: 0.28     # spectral periodicity index upper bound (< tau_spi to pass)
  tau_acm: 0.24     # autocorrelation metric upper bound (< tau_acm to pass)

# --- Delta-memory module ---
delta_memory:
  k: 3
  n_baseline: 200
  seed: 12345
  mi:
    bins: 20
    base: 2.718281828459045
    projection: mean
  baseline:
    mode: time_shuffle

# --- Figure output ---
figures:
  dpi: 300
  format: [png, pdf]
  output_dir: figures

# --- Cross-agent inference ---
cross_inference:
  n_agents: 3           # agents per class (minimum per §4.4.4 of spec)
  n_trajectories: 40    # trajectories per agent for QBM training
  n_test: 5             # test trajectories for cross-inference
  bins: 15              # histogram bins for CLMP estimation (frozen per M-5)
